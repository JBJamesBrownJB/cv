name: Build & deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run tests
        run: npm test
      - name: Build PDF
        run: npm run pdf
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html JB_CV.pdf _site/
          cp -r images _site/
          cp -r models _site/
          # Cache-bust the PDF link: the file URL is otherwise identical on every
          # deploy, so browsers/CDN keep serving a previously-cached copy even though
          # CI rebuilt the PDF. Stamp the commit SHA so each deploy gets a fresh URL.
          sed -i "s|href=\"JB_CV.pdf\"|href=\"JB_CV.pdf?v=${GITHUB_SHA::7}\"|g" _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
